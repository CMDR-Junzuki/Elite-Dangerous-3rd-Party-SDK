name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: pip install (one dep at a time)
        run: |
          set -o pipefail
          python --version 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          python -m pip --version 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          python -m pip install --upgrade pip 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          python -m pip install httpx 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          python -m pip install "websockets>=12.0" 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          python -m pip install pytest 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          python -m pip install pytest-asyncio 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          python -m pip install pytest-timeout 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          python -m pip list 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          python -m pip install -e . 2>&1 | tee -a $GITHUB_STEP_SUMMARY
      - name: run tests
        run: python -m pytest -v --tb=long -x tests/test_colonization.py

  dotnet:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ["8.0", "9.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - run: dotnet restore dotnet/EliteDangerousSdk.Tests
      - run: dotnet build dotnet/EliteDangerousSdk.Tests --nologo
      - run: dotnet test dotnet/EliteDangerousSdk.Tests --nologo
